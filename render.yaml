services:
  - type: web
    name: preptracker
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # you fill this in Render dashboard
      - key: JWT_SECRET
        sync: false          # you fill this in Render dashboard
      - key: DB_NAME
        value: preptracker
